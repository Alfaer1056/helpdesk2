<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">Заявки | Help Desk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Help Desk</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/}">Главная</a>
            <a class="nav-link active" th:href="@{/tickets}">Заявки</a>
            <a class="nav-link" th:href="@{/about}">О нас</a>
            <a class="nav-link" th:href="@{/contacts}">Контакты</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="mb-1">📋 Список заявок</h1>
            <p class="text-muted mb-0">Данные загружаются из H2 Database</p>
        </div>
        <div class="d-flex gap-2">
            <!-- НОВАЯ КНОПКА СОЗДАНИЯ ЗАЯВКИ -->
            <a th:href="@{/tickets/new}" class="btn btn-primary">
                + Создать заявку
            </a>
            <span class="badge text-bg-secondary fs-6 p-2"
                  th:text="${#lists.size(tickets)} + ' заявок'"></span>
        </div>
    </div>

    <!-- Фильтры -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <a th:href="@{/tickets}" class="btn btn-outline-primary w-100">Все заявки</a>
                </div>
                <div class="col-md-4">
                    <a th:href="@{/tickets/new-only}" class="btn btn-outline-success w-100">Новые (NEW)</a>
                </div>
                <div class="col-md-4">
                    <form th:action="@{/tickets/search}" method="get" class="d-flex gap-2">
                        <input type="text" name="customerName" class="form-control"
                               placeholder="Поиск по имени клиента">
                        <button type="submit" class="btn btn-primary">🔍</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Таблица заявок -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th style="width: 60px">ID</th>
                        <th>Тема / Описание</th>
                        <th style="width: 180px">Пользователь</th>
                        <th style="width: 120px">Статус</th>
                        <th style="width: 150px">Дата создания</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="ticket : ${tickets}">
                        <td class="fw-bold" th:text="${ticket.id}">1</td>
                        <td>
                            <strong th:text="${ticket.title}">Тема</strong>
                            <div class="small text-muted mt-1" th:text="${ticket.description}">Описание</div>
                        </td>
                        <td th:text="${ticket.customerName}">Иван Иванов</td>
                        <td>
                            <span class="badge"
                                  th:class="${ticket.status == 'NEW'} ? 'bg-warning text-dark' :
                                            (${ticket.status == 'IN_PROGRESS'} ? 'bg-info text-dark' : 'bg-success')"
                                  th:text="${ticket.status}">NEW</span>
                        </td>
                        <td class="text-muted small" th:text="${ticket.createdAt}">14.05.2026 09:00</td>
                    </tr>
                    <tr th:if="${tickets.isEmpty()}">
                        <td colspan="5" class="text-center py-4 text-muted">
                            Заявок не найдено
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
