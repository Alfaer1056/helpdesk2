<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель | Help Desk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/admin/tickets}">👑 Help Desk Admin</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" th:href="@{/tickets/new}">
                📝 Создать заявку
            </a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-warning btn-sm">
                    🚪 Выйти
                </button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="mb-1">📋 Список заявок</h1>
            <p class="text-muted mb-0">Закрытая зона администратора</p>
        </div>
        <span class="badge text-bg-primary fs-6 p-2"
              th:text="${#lists.size(tickets)} + ' заявок'">
            0 заявок
        </span>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Имя</th>
                        <th>Тема</th>
                        <th>Описание</th>
                        <th>Статус</th>
                        <th>Дата создания</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="ticket : ${tickets}">
                        <td class="fw-bold" th:text="${ticket.id}">1</td>
                        <td th:text="${ticket.customerName}">Иван</td>
                        <td th:text="${ticket.title}">Не работает ПК</td>
                        <td th:text="${ticket.description}">Описание</td>
                        <td>
                            <span class="badge"
                                  th:class="${ticket.status.name() == 'NEW'} ? 'bg-warning text-dark' :
                                           (${ticket.status.name() == 'IN_PROGRESS'} ? 'bg-info text-dark' : 'bg-success')"
                                  th:text="${ticket.status.name()}">NEW</span>
                        </td>
                        <td th:text="${#temporals.format(ticket.createdAt, 'dd.MM.yyyy HH:mm')}">
                            01.01.2026 10:00
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

</body>
</html>
